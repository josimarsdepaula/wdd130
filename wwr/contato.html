<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Josimar dos Santos Paula">
    <meta name="description"
        content="Página de contato da Aventura Rapids, especializada em rafting e turismo de aventura.">

    <link rel="stylesheet" href="estilos/rafting.css">

    <title>Contato | Aventura Rapids</title>
</head>

<body>
    <header>
        <img src="imagens/logo.png" alt="Logo Aventura Rapids">
        <nav>
            <ul>
                <li><a href="index.html">Página Inicial</a></li>
                <li><a href="sobre.html">Sobre Nós</a></li>
                <li><a href="passeios.html">Viagens</a></li>
                <li><a href="contato.html">Fale Conosco</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="endereco">
            <h1>Companhia de Rafting em Corredeiras</h1>
            <h2>123 Rua Principal do Rio</h2>
            <h2>Foz do Iguaçu, Paraná</h2>
            <h2>+55 45 99999-9999</h2>
            <h2>info@corredeiras.com</h2>
        </section>
        <section class="local">

            <div class="mapa">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d115192.00236496105!2d-54.7447872161865!3d-25.54670071127661!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x94f691d3b3776785%3A0x2399d5637cb2f83!2zUmlvIFBhcmFuw6EgLSBGb3ogZG8gSWd1YcOndSwgUGFyYW7DoSwgQnJhc2ls!5e0!3m2!1spt-BR!2sbr!4v1780607755697!5m2!1spt-BR!2sbr"
                    allowfullscreen="" loading="lazy">
                </iframe>
            </div>

            <div class="formulario">

                <form>

                    <div class="campo">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" name="nome" placeholder="Digite aqui" required>
                    </div>

                    <div class="campo">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" name="email" placeholder="Digite aqui" required>
                    </div>

                    <div class="campo radio-grupo">
                        <label>Propósito da Mensagem</label>

                        <div class="opcoes">

                            <label>
                                <input type="radio" name="proposito" value="duvida" checked>
                                Dúvida Geral
                            </label>

                            <label>
                                <input type="radio" name="proposito" value="reserva">
                                Pergunta sobre Reserva
                            </label>

                            <label>
                                <input type="radio" name="proposito" value="sugestao">
                                Sugestão
                            </label>

                        </div>
                    </div>

                    <div class="campo mensagem">
                        <label for="mensagem">Mensagem</label>

                        <textarea id="mensagem" name="mensagem" placeholder="Digite aqui" required></textarea>
                    </div>

                    <div class="newsletter">
                        <input type="checkbox" id="newsletter" name="newsletter">

                        <label for="newsletter">
                            Por favor, me inscreva na newsletter mensal
                        </label>
                    </div>

                    <button type="submit">
                        Entrar em Contato!
                    </button>

                </form>

            </div>

        </section>

        <section class="adventure">

            <h2>Estamos Aqui para Servi-lo</h2>

            <figure>
                <img src="imagens/adventure1.jpg" alt="Funcionário responsável por reservas">

                <figcaption>Perfil do Funcionário</figcaption>
            </figure>

            <figure>
                <img src="imagens/adventure2.jpg" alt="Funcionário responsável por passeios">

                <figcaption>Perfil do Funcionário</figcaption>
            </figure>

            <figure>
                <img src="imagens/adventure3.jpg" alt="Funcionário responsável pelo atendimento">

                <figcaption>Perfil do Funcionário</figcaption>
            </figure>

        </section>

    </main>

    <footer>

        <p>
            © 2026 Aventura Rapids | Josimar dos Santos Paula
        </p>

        <div class="socialmedia">

            <a href="https://facebook.com" target="_blank" rel="noopener noreferrer">

                <img src="imagens/icon-facebook.svg" alt="Facebook">
            </a>

            <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer">

                <img src="imagens/icon-linkedin.svg" alt="LinkedIn">
            </a>

            <a href="https://instagram.com" target="_blank" rel="noopener noreferrer">

                <img src="imagens/icon-instagram.svg" alt="Instagram">
            </a>

        </div>

    </footer>

</body>

</html>
