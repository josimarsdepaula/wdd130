<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Josimar dos Santos Paula">
    <meta name="description"
        content="Página fale conosco da Aventura Rapids, especializada em rafting e turismo de aventura.">

    <link rel="stylesheet" href="estilos/rafting.css">

    <title>Fale Conosco | Aventura Rapids</title>
</head>

<body>

    <header>

        <img src="imagens/logo.png" alt="Logo Aventura Rapids">

        <nav>
            <ul>
                <li><a href="index.html">Página Inicial</a></li>
                <li><a href="sobre.html">Sobre Nós</a></li>
                <li><a href="passeios.html">Passeios</a></li>
                <li><a href="contato.html">Fale Conosco</a></li>
            </ul>
        </nav>

    </header>

    <main>

        <section class="endereco">

            <h1>Empresa Aventura Rapids</h1>

            <p>123 Rua Principal do Rio</p>
            <p>Foz do Iguaçu, Paraná</p>
            <p>+55 45 99999-9999</p>
            <p>info@corredeiras.com</p>

        </section>

        <section class="local">

            <h2>Entre em Contato Conosco</h2>

            <div class="mapa">

                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d115192.00236496105!2d-54.7447872161865!3d-25.54670071127661!2m3!1f0!2f0!3f0!2m3!1i1024!2i768!4f13.1!3m3!1m2!1s0x94f691d3b3776785%3A0x2399d5637cb2f83!2zUmlvIFBhcmFuw6EgLSBGb3ogZG8gSWd1YcOndSwgUGFyYW7DoSwgQnJhc2ls!5e0!3m2!1spt-BR!2sbr!4v1780607755697!5m2!1spt-BR!2sbr"
                    allowfullscreen="" loading="lazy">
                </iframe>

            </div>

            <div class="formulario">

                <form>

                    <div class="campo">

                        <label for="nome">Nome</label>

                        <input type="text" id="nome" name="nome" placeholder="Digite aqui" required>

                    </div>

                    <div class="campo">

                        <label for="email">E-mail</label>

                        <input type="email" id="email" name="email" placeholder="Digite aqui" required>

                    </div>

                    <div class="campo radio-grupo">

                        <label>Propósito da Mensagem</label>

                        <div class="opcoes">

                            <label for="consulta">
                                <input type="radio" id="consulta" name="proposito" value="consulta" checked>
                                Consulta Geral
                            </label>

                            <label for="reserva">
                                <input type="radio" id="reserva" name="proposito" value="reserva">
                                Pergunta sobre Reserva
                            </label>

                            <label for="sugestao">
                                <input type="radio" id="sugestao" name="proposito" value="sugestao">
                                Sugestão de Site
                            </label>

                        </div>

                    </div>

                    <div class="campo mensagem">

                        <label for="mensagem">Mensagem</label>

                        <textarea id="mensagem" name="mensagem" placeholder="Digite aqui" required></textarea>

                    </div>

                    <div class="newsletter">

                        <input type="checkbox" id="newsletter" name="newsletter">

                        <label for="newsletter">
                            Quero receber a newsletter mensal
                        </label>

                    </div>

                    <button type="submit">
                        Entrar em Contato!
                    </button>

                </form>

            </div>

        </section>

        <section class="contato-equipe">

            <h2>Estamos Aqui para Servi-lo</h2>

            <div class="equipe">

                <figure>

                    <img src="imagens/joao-funcionario.png" alt="João Silva - Guia de Rafting">

                    <figcaption>
                        João Silva - Guia de Rafting
                    </figcaption>

                </figure>

                <figure>

                    <img src="imagens/maria-coordenadora.png" alt="Maria Souza - Coordenadora de Reservas">

                    <figcaption>
                        Maria Souza - Coordenadora de Reservas
                    </figcaption>

                </figure>

                <figure>

                    <img src="imagens/carlos-atendimento.png" alt="Carlos Lima - Atendimento ao Cliente">

                    <figcaption>
                        Carlos Lima - Atendimento ao Cliente
                    </figcaption>

                </figure>

            </div>

        </section>

    </main>

    <footer>

        <p>&copy; 2026 Aventura Rapids | Josimar dos Santos Paula</p>

        <nav class="redes-sociais">

            <a href="https://facebook.com" target="_blank" rel="noopener noreferrer">
                <img src="imagens/icon-facebook.svg" alt="Facebook">
            </a>

            <a href="https://linkedin.com" target="_blank" rel="noopener noreferrer">
                <img src="imagens/icon-linkedin.svg" alt="LinkedIn">
            </a>

            <a href="https://instagram.com" target="_blank" rel="noopener noreferrer">
                <img src="imagens/icon-instagram.svg" alt="Instagram">
            </a>

        </nav>

    </footer>

</body>

</html>
